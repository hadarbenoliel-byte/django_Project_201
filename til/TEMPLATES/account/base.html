{% extends "base.html" %}

{% block content %}
    {% if messages %}
        <div>
            <strong>Messages:</strong>
            <ul>
                {% for message in messages %}
                <li>{{ message }}</li>
                {% endfor %}
            </ul>
        </div>
    {% endif %}

    {% block account_content %}
        {% block content %}{% endblock %}
    {% endblock %}
{% endblock %}
